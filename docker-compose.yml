version: "3.9"

services:

  # 🟢 PHP-FPM (Laravel)
  ops-node-php:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    container_name: ops-node-php
    restart: unless-stopped
    volumes:
      - ./ops-node-api:/var/www
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ops_node
      DB_USERNAME: ops_node
      DB_PASSWORD: ops_node_secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    networks:
      - ops-network

  # 🔵 Nginx Backend (API)
  ops-node-api:
    image: nginx:alpine
    container_name: ops-node-api
    restart: unless-stopped
    volumes:
      - ./ops-node-api:/var/www
      - ./ops-node-api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ops-node-php
    networks:
      - ops-network

  # 🟡 Frontend (build estático con nginx)
  ops-node-front:
    build:
      context: ./ops-node-front
      dockerfile: docker/node/Dockerfile-PROD
    container_name: ops-node-front
    restart: unless-stopped
    networks:
      - ops-network

  # 🌐 Nginx Gateway (entrada única)
  ops-node-nginx:
    image: nginx:alpine
    container_name: ops-node-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:80"
    volumes:
      - ./ops-node-front/dist:/usr/share/nginx/html
      - ./ops-node-front/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ops-node-api
      - ops-node-front
    networks:
      - ops-network

  # 🟣 MySQL
  mysql:
    image: mysql:8.0
    container_name: ops-node-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ops_node
      MYSQL_USER: ops_node
      MYSQL_PASSWORD: ops_node_secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ops-network

  # 🔴 Redis
  redis:
    image: redis:7-alpine
    container_name: ops-node-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ops-network

  # ⚙️ Queue Worker (Horizon)
  horizon:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    container_name: ops-node-horizon
    restart: unless-stopped
    volumes:
      - ./ops-node-api:/var/www
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ops_node
      DB_USERNAME: ops_node
      DB_PASSWORD: ops_node_secret
      REDIS_HOST: redis
      REDIS_CLIENT: phpredis
      QUEUE_CONNECTION: redis
    command: php artisan horizon:work
    networks:
      - ops-network

volumes:
  mysql_data:
  redis_data:

networks:
  ops-network: