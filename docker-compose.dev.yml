services:
  ops-node-api-php:
    volumes:
      - ./ops-node-api:/var/www
      - ./ops-node-api/docker/php/php.dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  ops-node-api-nginx:
    volumes:
      - ./ops-node-api:/var/www
      - ./ops-node-api/docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"

  ops-node-front:
    build:
      dockerfile: docker/node/Dockerfile
    volumes:
      - ./ops-node-front:/app
      - front_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "5540:5540"
    networks:
      - ops-network

  ops-node-horizon-worker:
    volumes:
      - ./ops-node-api:/var/www
      - ./ops-node-api/docker/php/php.dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
