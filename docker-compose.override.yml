version: "3.9"

services:

  # PHP-FPM (Laravel) - Production
  ops-node-api-php:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  # Nginx API - Production (remove port, expose via gateway)
  ops-node-api-nginx:
    ports: []

  # Frontend - Production (build estático)
  ops-node-front:
    build:
      dockerfile: docker/node/Dockerfile-PROD
    volumes: []
    ports: []

  # Horizon Worker - Production
  ops-node-horizon-worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: php artisan horizon

  # MySQL - Production (no change needed, already configured in base)

  # Redis - Production (no change needed)
